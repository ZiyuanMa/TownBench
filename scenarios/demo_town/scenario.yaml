scenario_id: demo_town
seed: 13

opening_briefing: "You arrived in town at the start of the day. Public notices and shared facilities can help you find work and keep yourself going."
public_rules:
  - "Actions cost time and some actions cost energy."
  - "Public notices and written resources may contain process details and payout information."

initial_world_state:
  current_time: "Day 1, 08:00"
  world_flags:
    tea_ready: false
    order_logged: false
    payment_posted: false

initial_agent_state:
  location_id: plaza
  money: 12
  energy: 100

locations:
  - location_id: plaza
    name: Plaza
    description: "The town center with a public notice board."
    links: ["library", "workshop"]
    tags: ["public"]

  - location_id: library
    name: Library
    description: "A quiet library with reference shelves and short workshop guides."
    links: ["plaza"]
    tags: ["study"]

  - location_id: workshop
    name: Workshop
    description: "A small workshop with a tea station."
    links: ["plaza"]
    tags: ["craft"]

objects:
  - object_id: notice_board
    name: Notice Board
    object_type: board
    location_id: plaza
    summary: "A board with public notices."
    visible_state:
      latest_notice: "Tea work available for the current shift"
    readable: true
    resource_file: resources/tea_order.txt

  - object_id: recipe_card
    name: Recipe Card
    object_type: card
    location_id: library
    summary: "A short card with workshop brewing notes."
    readable: true
    resource_file: resources/recipe_card.txt

  - object_id: archive_book
    name: Archive Book
    object_type: book
    location_id: library
    summary: "A local history book with a chapter about tea culture."
    readable: true
    resource_file: resources/archive_book.txt

  - object_id: tea_station
    name: Tea Station
    object_type: station
    location_id: workshop
    summary: "A station that can brew tea for pickup."
    visible_state:
      brewed_today: false
    actionable: true
    callable_actions:
      brew_tea:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
              message: "You brewed a fresh pot of tea."
              required_world_flags:
                tea_ready: false
                order_logged: false
              set_visible_state:
                brewed_today: true
              set_world_flags:
                tea_ready: true

  - object_id: storage_shelf
    name: Storage Shelf
    object_type: shelf
    location_id: workshop
    summary: "A shelf with cups and loose leaves."
    visible_state:
      cups: 4
      tea_leaves: in_stock

  - object_id: completion_log
    name: Completion Log
    object_type: ledger
    location_id: workshop
    summary: "A ledger used to record finished tea orders and collect payment."
    visible_state:
      last_entry: none
    actionable: true
    callable_actions:
      record_order:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
              message: "You recorded the finished tea order and collected payment."
              money_delta: 9
              required_world_flags:
                tea_ready: true
                order_logged: false
              set_visible_state:
                last_entry: morning_tea_order
              set_world_flags:
                order_logged: true

action_costs:
  move_to:
    time_delta: 12
    energy_delta: -3
  open_resource:
    time_delta: 2
  call_action:
    time_delta: 10
    energy_delta: -4

event_rules:
  - event_id: tea_ready_notice
    when:
      world_flags:
        tea_ready: true
        order_logged: false
    set_world_flags:
      tea_announced: true
    set_object_visible_state:
      notice_board:
        latest_notice: "Fresh tea ready for pickup at the workshop"
    trigger_once: false

  - event_id: order_paid_notice
    when:
      world_flags:
        order_logged: true
    set_world_flags:
      tea_ready: false
      order_logged: false
      tea_announced: false
      payment_posted: true
    set_object_visible_state:
      notice_board:
        latest_notice: "Tea order paid. Another shift order is now posted."
      tea_station:
        brewed_today: false
      completion_log:
        last_entry: payout_collected
    trigger_once: false

termination_config:
  max_steps: 10
  stop_on_zero_energy: true
