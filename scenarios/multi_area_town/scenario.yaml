scenario_id: multi_area_town
seed: 29

opening_briefing: "You arrived in a compact working town where money comes from keeping small operating loops running across the market block, workshop building, depot rooms, home block and cafe corner. Some locations share an Area and can be crossed freely, but production and sales still happen in the exact room that holds the relevant object."
public_rules:
  - "Actions cost time and most actions cost energy."
  - "Your bag starts with a visible carry limit based on total item count."
  - "Locations may belong to an Area such as a building or district. You can move freely between locations in the same Area. Use `nearby_locations` to see every currently reachable location."
  - "Some town opportunities change by clock time. Local notices mention the relevant windows."

initial_world_state:
  current_time: "Day 1, 08:00"
  world_flags:
    locker_upgrade_purchased: false
    repair_job_accepted: false

initial_agent_state:
  location_id: plaza
  money: 14
  energy: 80
  stats:
    carry_limit: 3

areas:
  - area_id: market_block
    name: Market Block
    description: "A compact public trade district centered on the town plaza."
    tags: ["trade", "public"]

  - area_id: workshop_building
    name: Workshop Building
    description: "A multi-room production building with specialized work areas."
    tags: ["craft", "indoor"]

  - area_id: service_hub
    name: Service Hub
    description: "A clerk-run service wing handling storage and payout."
    tags: ["service"]

  - area_id: home_block
    name: Home Block
    description: "A small home where slow, low-cost recovery is available."
    tags: ["recovery", "home"]

  - area_id: cafe_corner
    name: Cafe Corner
    description: "A fast stop for paid recovery and quick local sales."
    tags: ["food", "recovery"]

locations:
  - location_id: plaza
    name: Plaza
    description: "A compact public square connecting the trade strip, workshop entrance and the town's support buildings."
    area_id: market_block
    links: ["workshop_lobby", "storage_room", "service_depot", "home_entry", "cafe_front"]
    tags: ["hub", "public"]

  - location_id: market
    name: Market
    description: "A busy trade strip where inputs are bought cheaply and finished goods are sold."
    area_id: market_block
    links: ["workshop_lobby", "cafe_front"]
    tags: ["trade"]

  - location_id: supply_shop
    name: Supply Shop
    description: "A narrow shop selling sleeves, parts and other operating supplies."
    area_id: market_block
    tags: ["supplies"]

  - location_id: fuel_counter
    name: Fuel Counter
    description: "A small counter dedicated to fresh fuel canisters and usage notices."
    area_id: market_block
    tags: ["fuel"]

  - location_id: workshop_lobby
    name: Workshop Lobby
    description: "A central corridor inside the workshop building leading to specialized work rooms."
    area_id: workshop_building
    links: ["plaza", "market", "service_depot", "cafe_front"]
    tags: ["craft", "entry"]

  - location_id: tea_room
    name: Tea Room
    description: "A warm production room holding the brewing station."
    area_id: workshop_building
    tags: ["craft", "tea"]

  - location_id: packing_room
    name: Packing Room
    description: "A clean room for sealing brewed tea into sale-ready lots."
    area_id: workshop_building
    tags: ["craft", "packing"]

  - location_id: meal_prep_room
    name: Meal Prep Room
    description: "A prep room for assembling cheap ingredient kits into boxed meals."
    area_id: workshop_building
    tags: ["craft", "food"]

  - location_id: repair_room
    name: Repair Room
    description: "A compact service room with benches for paid repair jobs."
    area_id: workshop_building
    tags: ["craft", "repair"]

  - location_id: storage_room
    name: Storage Room
    description: "A clerk-run room where extra locker space can be purchased once."
    area_id: service_hub
    links: ["plaza"]
    tags: ["capacity"]

  - location_id: service_depot
    name: Service Depot
    description: "A pickup office for finished repair work and signed service tickets."
    area_id: service_hub
    links: ["plaza", "workshop_lobby"]
    tags: ["service"]

  - location_id: home_entry
    name: Home Entry
    description: "A quiet front room connecting the kitchen and bedroom."
    area_id: home_block
    links: ["plaza"]
    tags: ["home"]

  - location_id: kitchen
    name: Kitchen
    description: "A modest kitchen with pantry shelves and enough space for a quick meal."
    area_id: home_block
    tags: ["home", "food"]

  - location_id: bedroom
    name: Bedroom
    description: "A simple bedroom where you can rest when cash is low."
    area_id: home_block
    tags: ["home", "rest"]

  - location_id: cafe_front
    name: Cafe Front
    description: "A sidewalk-facing cafe entrance that connects to the counter and pickup window."
    area_id: cafe_corner
    links: ["plaza", "market", "workshop_lobby"]
    tags: ["food", "entry"]

  - location_id: coffee_counter
    name: Coffee Counter
    description: "A quick-service counter selling hot coffee for tired workers."
    area_id: cafe_corner
    tags: ["food", "recovery"]

  - location_id: pickup_window
    name: Pickup Window
    description: "A side window buying finished meals and local tea lots."
    area_id: cafe_corner
    tags: ["food", "trade"]

objects:
  - object_id: operations_board
    name: Operations Board
    object_type: board
    location_id: plaza
    summary: "A handwritten board with scattered timing notes for the town's active work."
    readable: true
    resource_file: resources/operations_board.txt

  - object_id: tea_wholesaler
    name: Tea Wholesaler
    object_type: stall
    location_id: market
    summary: "A wholesaler selling tea bundles one batch at a time."
    visible_state:
      tea_bundle_price: 4
    actionable: true
    callable_actions:
      buy_tea_bundle:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought one tea bundle."
                    required_money: 4
                    money_delta: -4
                    inventory_delta:
                      tea_bundle: 1
  - object_id: ingredient_seller
    name: Ingredient Seller
    object_type: stall
    location_id: market
    summary: "A seller offering the cheapest meal ingredients in town."
    visible_state:
      meal_ingredients_price: 2
    actionable: true
    callable_actions:
      buy_meal_ingredients:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought one set of meal ingredients."
                    required_money: 2
                    money_delta: -2
                    inventory_delta:
                      meal_ingredients: 1
  - object_id: bargain_bin
    name: Bargain Bin
    object_type: bin
    location_id: market
    summary: "A bin of dusty clearance goods that are cheap but tie up bag space."
    visible_state:
      dusty_trinket_price: 1
      buyer_bid: 0
    actionable: true
    callable_actions:
      buy_dusty_trinket:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought one dusty trinket."
                    required_money: 1
                    money_delta: -1
                    inventory_delta:
                      dusty_trinket: 1
  - object_id: tea_batch_crate
    name: Tea Batch Crate
    object_type: crate
    location_id: market
    summary: "A bundled crate of tea inputs that only fits once your carrying capacity is expanded."
    visible_state:
      batch_price: 11
      batch_load: 5
    actionable: true
    callable_actions:
      buy_tea_batch:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought a bundled tea batch with two tea bundles, two sleeves and one fuel canister."
                    required_money: 11
                    money_delta: -11
                    inventory_delta:
                      tea_bundle: 2
                      packaging_sleeve: 2
                      fuel_canister: 1
  - object_id: goods_buyer
    name: Goods Buyer
    object_type: buyer
    location_id: market
    summary: "A buyer whose packed tea offer changes during a short morning rush."
    visible_state:
      packed_tea_payout: 14
      dusty_trinket_payout: 0
    actionable: true
    callable_actions:
      sell:
        description: "Sell one finished or leftover item to the buyer."
        arguments:
          item_id:
            options: ["packed_tea", "dusty_trinket"]
        routes:
          - match:
              item_id: packed_tea
            effect:
              message: "You sold one packed tea lot."
              required_inventory:
                packed_tea: 1
              money_delta: 14
              inventory_delta:
                packed_tea: -1
          - match:
              item_id: dusty_trinket
            effect:
              message: "You cleared one dusty trinket for almost nothing."
              required_inventory:
                dusty_trinket: 1
              inventory_delta:
                dusty_trinket: -1

  - object_id: tea_station
    name: Tea Station
    object_type: station
    location_id: tea_room
    summary: "A brewing station that consumes both tea bundles and fresh fuel."
    visible_state:
      fuel_per_batch: 1
    actionable: true
    callable_actions:
      brew_tea:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You brewed one tea bundle into prepared tea."
                    required_inventory:
                      tea_bundle: 1
                      fuel_canister: 1
                    inventory_delta:
                      tea_bundle: -1
                      fuel_canister: -1
                      brewed_tea: 1
  - object_id: packaging_table
    name: Packaging Table
    object_type: table
    location_id: packing_room
    summary: "A table for sealing brewed tea into sale-ready lots."
    visible_state:
      sleeve_per_batch: 1
    actionable: true
    callable_actions:
      pack_tea:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You packed one brewed tea lot."
                    required_inventory:
                      brewed_tea: 1
                      packaging_sleeve: 1
                    inventory_delta:
                      brewed_tea: -1
                      packaging_sleeve: -1
                      packed_tea: 1
  - object_id: meal_prep_table
    name: Meal Prep Table
    object_type: table
    location_id: meal_prep_room
    summary: "A prep table for turning cheap ingredients into deliverable meal boxes."
    actionable: true
    callable_actions:
      assemble_meal_box:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You assembled one meal box."
                    required_inventory:
                      meal_ingredients: 1
                    inventory_delta:
                      meal_ingredients: -1
                      meal_box: 1
  - object_id: repair_bench
    name: Repair Bench
    object_type: bench
    location_id: repair_room
    summary: "A bench where accepted service jobs are completed after you bring the right part."
    visible_state:
      service_fee: 16
    actionable: true
    callable_actions:
      service_kettle:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You completed one depot repair and received a signed service ticket."
                    required_world_flags:
                      repair_job_accepted: true
                    required_inventory:
                      repair_part: 1
                    inventory_delta:
                      repair_part: -1
                      serviced_device_ticket: 1
                    set_world_flags:
                      repair_job_accepted: false
  - object_id: meal_counter
    name: Meal Counter
    object_type: counter
    location_id: pickup_window
    summary: "A side window buying finished meal boxes during breakfast traffic and selling hot recovery food."
    visible_state:
      meal_box_payout: 5
      hot_meal_price: 4
    actionable: true
    callable_actions:
      sell_meal_box:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You delivered one meal box to the cafe pickup window."
                    required_inventory:
                      meal_box: 1
                    money_delta: 5
                    inventory_delta:
                      meal_box: -1
      buy_hot_meal:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought a hot meal and recovered energy."
                    required_money: 4
                    money_delta: -4
                    energy_delta: 26
  - object_id: supply_counter
    name: Supply Counter
    object_type: counter
    location_id: supply_shop
    summary: "A counter selling packaging sleeves and repair parts."
    visible_state:
      packaging_sleeve_price: 1
      repair_part_price: 6
    actionable: true
    callable_actions:
      buy:
        description: "Buy one supply item from the counter."
        arguments:
          item_id:
            options: ["packaging_sleeve", "repair_part"]
        routes:
          - match:
              item_id: packaging_sleeve
            effect:
              message: "You bought one packaging sleeve."
              required_money: 1
              money_delta: -1
              inventory_delta:
                packaging_sleeve: 1
          - match:
              item_id: repair_part
            effect:
              message: "You bought one repair part."
              required_money: 6
              money_delta: -6
              inventory_delta:
                repair_part: 1

  - object_id: locker_desk
    name: Locker Desk
    object_type: desk
    location_id: storage_room
    summary: "A storage clerk offering one permanent locker upgrade for the current run."
    visible_state:
      upgrade_price: 6
      upgrade_status: available
    actionable: true
    callable_actions:
      buy_locker_upgrade:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You paid for the locker upgrade and your carry limit increased by 2."
                    required_money: 6
                    required_world_flags:
                      locker_upgrade_purchased: false
                    money_delta: -6
                    agent_stat_deltas:
                      carry_limit: 2
                    set_visible_state:
                      upgrade_status: purchased
                    set_world_flags:
                      locker_upgrade_purchased: true
  - object_id: shelf_space_ledger
    name: Shelf Space Ledger
    object_type: ledger
    location_id: storage_room
    summary: "A ledger listing the cost and effect of the locker upgrade."
    readable: true
    resource_file: resources/shelf_space_ledger.txt

  - object_id: pickup_clerk
    name: Pickup Clerk
    object_type: clerk
    location_id: service_depot
    summary: "A depot clerk who pays out signed service tickets outside posted breaks."
    visible_state:
      serviced_device_ticket_payout: 16
    actionable: true
    callable_actions:
      collect_service_fee:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You handed over the service ticket and collected the repair payout."
                    required_inventory:
                      serviced_device_ticket: 1
                    money_delta: 16
                    inventory_delta:
                      serviced_device_ticket: -1
  - object_id: repair_queue
    name: Repair Queue
    object_type: board
    location_id: service_depot
    summary: "A board for accepting morning repair jobs and checking depot payout windows."
    visible_state:
      intake_open: true
      intake_window: "08:00-09:15"
      morning_premium_until: "09:30"
      lunch_break: "11:30-13:00"
    readable: true
    actionable: true
    resource_file: resources/repair_queue.txt
    callable_actions:
      accept_repair_job:
        description: "Accept one commuter kettle repair job during the morning intake window."
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You accepted one commuter kettle repair job from the depot queue."
                    required_world_flags:
                      repair_job_accepted: false
                    set_visible_state:
                      intake_status: accepted
                    set_world_flags:
                      repair_job_accepted: true

  - object_id: fuel_rack
    name: Fuel Rack
    object_type: rack
    location_id: fuel_counter
    summary: "A rack of fresh fuel canisters with a posted early-shift price."
    visible_state:
      fuel_canister_price: 2
    actionable: true
    callable_actions:
      buy_fuel_canister:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought one fuel canister."
                    required_money: 2
                    money_delta: -2
                    inventory_delta:
                      fuel_canister: 1
  - object_id: usage_notice
    name: Usage Notice
    object_type: notice
    location_id: fuel_counter
    summary: "A short operations note about fuel timing and tea materials."
    readable: true
    resource_file: resources/usage_notice.txt

  - object_id: pantry_shelf
    name: Pantry Shelf
    object_type: shelf
    location_id: kitchen
    summary: "A pantry shelf where boxed meals can be eaten instead of sold."
    actionable: true
    callable_actions:
      eat_meal_box:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You ate one meal box at home and recovered energy."
                    required_inventory:
                      meal_box: 1
                    energy_delta: 20
                    inventory_delta:
                      meal_box: -1
  - object_id: bed
    name: Bed
    object_type: bed
    location_id: bedroom
    summary: "A plain bed that offers a slow but free recovery option."
    actionable: true
    callable_actions:
      sleep_shift:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You took a rest at home and recovered energy."
                    energy_delta: 40
  - object_id: barista
    name: Barista
    object_type: counter
    location_id: coffee_counter
    summary: "A barista selling quick coffee to workers who need to get moving again."
    actionable: true
    callable_actions:
      buy_coffee:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You bought a coffee and recovered energy."
                    required_money: 3
                    money_delta: -3
                    energy_delta: 16
  - object_id: cafe_buyer
    name: Cafe Buyer
    object_type: buyer
    location_id: pickup_window
    summary: "A local buyer who will take packed tea for less than the main market rate."
    visible_state:
      packed_tea_payout: 12
    actionable: true
    callable_actions:
      sell_packed_tea:
        description: ""
        arguments: {}
        routes:
          - match: {}
            effect:
                    message: "You sold one packed tea lot at the cafe window."
                    required_inventory:
                      packed_tea: 1
                    money_delta: 12
                    inventory_delta:
                      packed_tea: -1
action_costs:
  move_to:
    time_delta: 6
    energy_delta: -1
  open_resource:
    time_delta: 2
  call_action:
    time_delta: 8
    energy_delta: -4

dynamic_rules:
  - rule_id: early_fuel_discount
    priority: 10
    when:
      time_window:
        start: "08:00"
        end: "08:45"
    apply:
      object_overrides:
        fuel_rack:
          visible_state:
            fuel_canister_price: 1
            price_window: "early_shift"
          callable_action_overrides:
            - match:
                action_name: buy_fuel_canister
              override:
                required_money: 1
                money_delta: -1

  - rule_id: breakfast_meal_bonus
    priority: 10
    when:
      time_window:
        start: "08:45"
        end: "09:15"
    apply:
      object_overrides:
        meal_counter:
          visible_state:
            meal_box_payout: 7
            demand_window: "breakfast_rush"
          callable_action_overrides:
            - match:
                action_name: sell_meal_box
              override:
                money_delta: 7

  - rule_id: morning_packed_tea_bonus
    priority: 10
    when:
      time_window:
        start: "09:30"
        end: "10:00"
    apply:
      object_overrides:
        goods_buyer:
          visible_state:
            packed_tea_payout: 18
            demand_window: "morning_rush"
          callable_action_overrides:
            - match:
                action_name: sell
                action_args:
                  item_id: packed_tea
              override:
                money_delta: 18

  - rule_id: morning_repair_premium
    priority: 10
    when:
      time_window:
        start: "08:00"
        end: "09:30"
    apply:
      object_overrides:
        pickup_clerk:
          visible_state:
            serviced_device_ticket_payout: 18
            payout_window: "morning_premium"
          callable_action_overrides:
            - match:
                action_name: collect_service_fee
              override:
                money_delta: 18

  - rule_id: depot_lunch_break
    priority: 20
    when:
      time_window:
        start: "11:30"
        end: "13:00"
    apply:
      object_overrides:
        pickup_clerk:
          visible_state:
            payout_window: "lunch_break"
          disabled_callable_actions:
            - action_name: collect_service_fee

  - rule_id: repair_queue_intake_closed
    priority: 10
    when:
      not:
        time_window:
          start: "08:00"
          end: "09:15"
    apply:
      object_overrides:
        repair_queue:
          visible_state:
            intake_open: false
          disabled_callable_actions:
            - action_name: accept_repair_job

termination_config:
  max_steps: 50
  stop_on_zero_energy: true
