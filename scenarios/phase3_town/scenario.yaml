scenario_id: phase3_town
seed: 31

opening_briefing: "You arrived in a district where timing now matters as much as execution. Some counters are closed outside business hours, buyers change their payout windows, and short-lived rushes can completely reorder the best loop."
public_rules:
  - "Actions cost time and most actions cost energy."
  - "Visible prices and opening status match the actual execution rules for the current time."
  - "The tea buyer has a mid-morning surge window that raises packed tea payout."
  - "The canteen pays more during its lunch rush window."
  - "The pickup clerk only pays out repair tickets during office hours."

initial_world_state:
  current_time: "Day 1, 08:00"

initial_agent_state:
  location_id: plaza
  money: 14
  energy: 80
  stats:
    carry_limit: 3

locations:
  - location_id: plaza
    name: Plaza
    description: "A public square linking the trading strip, workshop lane and depot offices."
    links: ["market", "service_depot"]
    tags: ["hub", "public"]

  - location_id: market
    name: Market
    description: "A trade strip where inputs are bought and finished goods are sold."
    links: ["plaza", "workshop", "canteen", "supply_shop", "fuel_counter"]
    tags: ["trade"]

  - location_id: workshop
    name: Workshop
    description: "A shared production floor for brewing, packing, meal prep and repair work."
    links: ["market", "canteen", "supply_shop", "service_depot"]
    tags: ["craft"]

  - location_id: canteen
    name: Canteen
    description: "A kitchen counter that buys prepared meals and sells hot staff food."
    links: ["market", "workshop"]
    tags: ["food"]

  - location_id: supply_shop
    name: Supply Shop
    description: "A narrow shop selling sleeves and repair parts."
    links: ["market", "workshop", "fuel_counter"]
    tags: ["supplies"]

  - location_id: service_depot
    name: Service Depot
    description: "A depot office where finished repair tickets are cashed out."
    links: ["plaza", "workshop"]
    tags: ["service"]

  - location_id: fuel_counter
    name: Fuel Counter
    description: "A small counter dedicated to fresh fuel canisters."
    links: ["market", "supply_shop"]
    tags: ["fuel"]

objects:
  - object_id: operations_board
    name: Operations Board
    object_type: board
    location_id: plaza
    summary: "A board showing the district's timing windows and operating hints."
    readable: true
    resource_content: |
      Today's timing windows:
      - Tea buyer surge: 09:30 to 10:30
      - Canteen lunch rush: 10:00 to 11:30
      - Depot ticket office closes at 12:00
      - Supply counter opens at 08:30

  - object_id: tea_wholesaler
    name: Tea Wholesaler
    object_type: stall
    location_id: market
    summary: "A wholesaler selling tea bundles one batch at a time."
    visible_state:
      tea_bundle_price: 4
    actionable: true
    action_ids: ["buy_tea_bundle"]
    action_effects:
      buy_tea_bundle:
        message: "You bought one tea bundle."
        required_money: 4
        money_delta: -4
        inventory_delta:
          tea_bundle: 1

  - object_id: ingredient_seller
    name: Ingredient Seller
    object_type: stall
    location_id: market
    summary: "A seller offering low-cost meal ingredients."
    visible_state:
      meal_ingredients_price: 2
    actionable: true
    action_ids: ["buy_meal_ingredients"]
    action_effects:
      buy_meal_ingredients:
        message: "You bought one set of meal ingredients."
        required_money: 2
        money_delta: -2
        inventory_delta:
          meal_ingredients: 1

  - object_id: goods_buyer
    name: Goods Buyer
    object_type: buyer
    location_id: market
    summary: "A buyer who pays more for packed tea during the mid-morning surge."
    visible_state:
      packed_tea_payout: 14
    actionable: true
    action_ids: ["sell_packed_tea"]
    action_effects:
      sell_packed_tea:
        message: "You sold one packed tea lot."
        required_inventory:
          packed_tea: 1
        money_delta: 14
        inventory_delta:
          packed_tea: -1

  - object_id: tea_station
    name: Tea Station
    object_type: station
    location_id: workshop
    summary: "A brewing station that consumes both tea bundles and fresh fuel."
    visible_state:
      fuel_per_batch: 1
    actionable: true
    action_ids: ["brew_tea"]
    action_effects:
      brew_tea:
        message: "You brewed one tea bundle into prepared tea."
        required_inventory:
          tea_bundle: 1
          fuel_canister: 1
        inventory_delta:
          tea_bundle: -1
          fuel_canister: -1
          brewed_tea: 1

  - object_id: packaging_table
    name: Packaging Table
    object_type: table
    location_id: workshop
    summary: "A table for sealing brewed tea into sale-ready lots."
    visible_state:
      sleeve_per_batch: 1
    actionable: true
    action_ids: ["pack_tea"]
    action_effects:
      pack_tea:
        message: "You packed one brewed tea lot."
        required_inventory:
          brewed_tea: 1
          packaging_sleeve: 1
        inventory_delta:
          brewed_tea: -1
          packaging_sleeve: -1
          packed_tea: 1

  - object_id: meal_prep_table
    name: Meal Prep Table
    object_type: table
    location_id: workshop
    summary: "A prep table for turning cheap ingredients into deliverable meal boxes."
    actionable: true
    action_ids: ["assemble_meal_box"]
    action_effects:
      assemble_meal_box:
        message: "You assembled one meal box."
        required_inventory:
          meal_ingredients: 1
        inventory_delta:
          meal_ingredients: -1
          meal_box: 1

  - object_id: repair_bench
    name: Repair Bench
    object_type: bench
    location_id: workshop
    summary: "A bench where paid service jobs are completed after you bring the right part."
    visible_state:
      service_fee: 16
    actionable: true
    action_ids: ["service_kettle"]
    action_effects:
      service_kettle:
        message: "You completed one depot repair and received a signed service ticket."
        required_inventory:
          repair_part: 1
        inventory_delta:
          repair_part: -1
          serviced_device_ticket: 1

  - object_id: meal_counter
    name: Meal Counter
    object_type: counter
    location_id: canteen
    summary: "A kitchen counter that pays more for meal boxes during the rush."
    visible_state:
      meal_box_payout: 5
      hot_meal_price: 4
    actionable: true
    action_ids: ["sell_meal_box", "buy_hot_meal"]
    action_effects:
      sell_meal_box:
        message: "You delivered one meal box to the canteen kitchen."
        required_inventory:
          meal_box: 1
        money_delta: 5
        inventory_delta:
          meal_box: -1
      buy_hot_meal:
        message: "You bought a hot meal and recovered energy."
        required_money: 4
        money_delta: -4
        energy_delta: 26

  - object_id: supply_counter
    name: Supply Counter
    object_type: counter
    location_id: supply_shop
    summary: "A counter selling packaging sleeves and repair parts once the shop opens."
    visible_state:
      open: true
      packaging_sleeve_price: 1
      repair_part_price: 6
    actionable: true
    action_ids: ["buy_packaging_sleeve", "buy_repair_part"]
    action_effects:
      buy_packaging_sleeve:
        message: "You bought one packaging sleeve."
        required_money: 1
        money_delta: -1
        inventory_delta:
          packaging_sleeve: 1
      buy_repair_part:
        message: "You bought one repair part."
        required_money: 6
        money_delta: -6
        inventory_delta:
          repair_part: 1

  - object_id: pickup_clerk
    name: Pickup Clerk
    object_type: clerk
    location_id: service_depot
    summary: "A depot clerk who only pays out signed service tickets during office hours."
    visible_state:
      open: true
      serviced_device_ticket_payout: 16
    actionable: true
    action_ids: ["collect_service_fee"]
    action_effects:
      collect_service_fee:
        message: "You handed over the service ticket and collected the repair payout."
        required_inventory:
          serviced_device_ticket: 1
        money_delta: 16
        inventory_delta:
          serviced_device_ticket: -1

  - object_id: fuel_rack
    name: Fuel Rack
    object_type: rack
    location_id: fuel_counter
    summary: "A rack of fresh fuel canisters for the tea station."
    visible_state:
      fuel_canister_price: 2
    actionable: true
    action_ids: ["buy_fuel_canister"]
    action_effects:
      buy_fuel_canister:
        message: "You bought one fuel canister."
        required_money: 2
        money_delta: -2
        inventory_delta:
          fuel_canister: 1

skills:
  - skill_id: tea_operations
    file: ../phase2_town/skills/tea_operations.md
  - skill_id: cashflow_recovery
    file: ../phase2_town/skills/cashflow_recovery.md
  - skill_id: service_contracts
    file: ../phase2_town/skills/service_contracts.md

action_costs:
  move_to:
    time_delta: 12
    energy_delta: -3
  open_resource:
    time_delta: 2
  load_skill:
    time_delta: 4
    energy_delta: -1
  call_action:
    time_delta: 8
    energy_delta: -4

dynamic_rules:
  - rule_id: supply_counter_closed_early
    when:
      time_window:
        start: "17:00"
        end: "08:30"
    apply:
      object_overrides:
        supply_counter:
          visible_state:
            open: false
          disabled_actions: ["buy_packaging_sleeve", "buy_repair_part"]

  - rule_id: goods_buyer_morning_surge
    priority: 10
    when:
      time_window:
        start: "09:30"
        end: "10:30"
    apply:
      object_overrides:
        goods_buyer:
          visible_state:
            packed_tea_payout: 18
          action_overrides:
            sell_packed_tea:
              money_delta: 18

  - rule_id: meal_counter_lunch_rush
    priority: 10
    when:
      time_window:
        start: "10:00"
        end: "11:30"
    apply:
      object_overrides:
        meal_counter:
          visible_state:
            meal_box_payout: 8
          action_overrides:
            sell_meal_box:
              money_delta: 8

  - rule_id: pickup_clerk_closed
    when:
      time_window:
        start: "12:00"
        end: "09:00"
    apply:
      object_overrides:
        pickup_clerk:
          visible_state:
            open: false
          disabled_actions: ["collect_service_fee"]

termination_config:
  max_steps: 50
  stop_on_zero_energy: true
