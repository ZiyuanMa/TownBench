scenario_id: phase1_town
seed: 21

opening_briefing: "You arrived in a compact trade town with several visible ways to earn and spend money. Public notices, short guides and shop counters expose prices, but you still need to choose what is worth doing."
public_rules:
  - "Actions cost time and most actions cost energy."
  - "You can spend money on food, transport, tools and materials."
  - "Some profitable actions require inventory items or a small setup investment."
  - "Written resources contain clues, but not every document is worth your time."

initial_world_state:
  current_time: "Day 1, 08:00"
  world_flags:
    delivery_job_open: true
    delivery_job_active: false
    packaging_kit_owned: false

initial_agent_state:
  location_id: plaza
  money: 12
  energy: 55

locations:
  - location_id: plaza
    name: Plaza
    description: "The public center of town with notices, foot traffic and routes to the main districts."
    links: ["library", "market", "station"]
    tags: ["public", "hub"]

  - location_id: library
    name: Library
    description: "A quiet reference room with short operational notes and one shelf of local history."
    links: ["plaza", "workshop"]
    tags: ["study"]

  - location_id: market
    name: Market
    description: "A busy market where raw goods and finished products change hands quickly."
    links: ["plaza", "workshop", "canteen", "supply_shop"]
    tags: ["trade"]

  - location_id: workshop
    name: Workshop
    description: "A shared workshop with a tea station, packaging table and a repair corner."
    links: ["market", "library"]
    tags: ["craft"]

  - location_id: canteen
    name: Canteen
    description: "A canteen that buys produce and sells cheap recovery food."
    links: ["market"]
    tags: ["recovery"]

  - location_id: station
    name: Station
    description: "A small station with parcel lockers and a cart service for paid shortcuts."
    links: ["plaza"]
    tags: ["transport"]

  - location_id: supply_shop
    name: Supply Shop
    description: "A narrow supply shop carrying the basic tools needed for better-paying work."
    links: ["market"]
    tags: ["tools"]

objects:
  - object_id: job_board
    name: Job Board
    object_type: board
    location_id: plaza
    summary: "A board listing simple public work."
    visible_state:
      latest_job: "Parcel run to the station pays 7 coins."
    readable: true
    actionable: true
    resource_file: resources/job_board.txt
    action_ids: ["accept_delivery_run"]
    action_effects:
      accept_delivery_run:
        message: "You took the parcel run and picked up a sealed delivery parcel."
        required_world_flags:
          delivery_job_open: true
          delivery_job_active: false
        inventory_delta:
          delivery_parcel: 1
        set_visible_state:
          latest_job: "Current parcel is already in transit."
        set_world_flags:
          delivery_job_open: false
          delivery_job_active: true

  - object_id: public_bench
    name: Public Bench
    object_type: bench
    location_id: plaza
    summary: "A plain bench where workers stop to compare today's options."

  - object_id: recipe_shelf
    name: Recipe Shelf
    object_type: shelf
    location_id: library
    summary: "A shelf with short workshop instructions and pricing notes."
    readable: true
    resource_file: resources/recipe_shelf.txt

  - object_id: trade_notes
    name: Trade Notes
    object_type: notes
    location_id: library
    summary: "Pinned notes about small local spreads and a profitable maintenance contract."
    readable: true
    resource_file: resources/trade_notes.txt

  - object_id: archive_book
    name: Archive Book
    object_type: book
    location_id: library
    summary: "A heavy town history volume with no obvious operational value."
    readable: true
    resource_file: resources/archive_book.txt

  - object_id: tea_vendor
    name: Tea Vendor
    object_type: stall
    location_id: market
    summary: "A stall selling sealed tea bundles for workshop processing."
    visible_state:
      tea_bundle_price: 4
    actionable: true
    action_ids: ["buy_tea_bundle"]
    action_effects:
      buy_tea_bundle:
        message: "You bought one tea bundle."
        required_money: 4
        money_delta: -4
        inventory_delta:
          tea_bundle: 1

  - object_id: produce_stall
    name: Produce Stall
    object_type: stall
    location_id: market
    summary: "A produce stall selling fruit boxes at the market rate."
    visible_state:
      fruit_box_price: 2
    actionable: true
    action_ids: ["buy_fruit_box"]
    action_effects:
      buy_fruit_box:
        message: "You bought one fruit box."
        required_money: 2
        money_delta: -2
        inventory_delta:
          fruit_box: 1

  - object_id: general_buyer
    name: General Buyer
    object_type: buyer
    location_id: market
    summary: "A buyer who pays cash for packaged tea."
    visible_state:
      packed_tea_payout: 15
    actionable: true
    action_ids: ["sell_packed_tea"]
    action_effects:
      sell_packed_tea:
        message: "You sold one packaged tea lot."
        required_inventory:
          packed_tea: 1
        money_delta: 15
        inventory_delta:
          packed_tea: -1

  - object_id: tea_station
    name: Tea Station
    object_type: station
    location_id: workshop
    summary: "A brewing station for turning tea bundles into prepared tea."
    actionable: true
    action_ids: ["brew_tea"]
    action_effects:
      brew_tea:
        message: "You brewed one tea bundle into prepared tea."
        required_inventory:
          tea_bundle: 1
        inventory_delta:
          tea_bundle: -1
          brewed_tea: 1

  - object_id: packaging_table
    name: Packaging Table
    object_type: table
    location_id: workshop
    summary: "A table for boxing prepared tea into market-ready goods."
    actionable: true
    action_ids: ["pack_tea"]
    action_effects:
      pack_tea:
        message: "You packed the prepared tea into a sale-ready lot."
        required_inventory:
          brewed_tea: 1
          packaging_kit: 1
        inventory_delta:
          brewed_tea: -1
          packed_tea: 1

  - object_id: repair_corner
    name: Repair Corner
    object_type: bench
    location_id: workshop
    summary: "A maintenance bench used for short contract repair jobs."
    visible_state:
      commuter_kettle_payout: 13
    actionable: true
    action_ids: ["service_commuter_kettle"]
    action_effects:
      service_commuter_kettle:
        message: "You completed the commuter kettle repair contract."
        required_inventory:
          repair_kit: 1
        money_delta: 13
        inventory_delta:
          repair_kit: -1
        set_visible_state:
          last_service: commuter_kettle

  - object_id: meal_counter
    name: Meal Counter
    object_type: counter
    location_id: canteen
    summary: "A meal counter that buys produce and sells a hot lunch."
    visible_state:
      hot_meal_price: 5
      fruit_box_bid: 6
    actionable: true
    action_ids: ["buy_hot_meal", "sell_fruit_box"]
    action_effects:
      buy_hot_meal:
        message: "You bought a hot meal and recovered energy."
        required_money: 5
        money_delta: -5
        energy_delta: 28
      sell_fruit_box:
        message: "You sold one fruit box to the canteen kitchen."
        required_inventory:
          fruit_box: 1
        money_delta: 6
        inventory_delta:
          fruit_box: -1

  - object_id: cheap_snack_rack
    name: Cheap Snack Rack
    object_type: rack
    location_id: canteen
    summary: "A rack of low-cost snacks for quick recovery."
    visible_state:
      snack_price: 2
    actionable: true
    action_ids: ["buy_snack"]
    action_effects:
      buy_snack:
        message: "You bought a cheap snack."
        required_money: 2
        money_delta: -2
        energy_delta: 12

  - object_id: express_cart
    name: Express Cart
    object_type: cart
    location_id: station
    summary: "A paid cart service that skips part of the walking route."
    visible_state:
      market_route_fee: 1
      workshop_route_fee: 2
      last_route: none
    actionable: true
    action_ids: ["ride_to_market", "ride_to_workshop"]
    action_effects:
      ride_to_market:
        message: "You paid for the cart and rode directly to the market."
        required_money: 1
        money_delta: -1
        move_to_location_id: market
        set_visible_state:
          last_route: station_to_market
      ride_to_workshop:
        message: "You paid for the cart and rode directly to the workshop."
        required_money: 2
        money_delta: -2
        move_to_location_id: workshop
        set_visible_state:
          last_route: station_to_workshop

  - object_id: parcel_locker
    name: Parcel Locker
    object_type: locker
    location_id: station
    summary: "A locker bank where public parcel runs are completed."
    visible_state:
      last_dropoff: none
    actionable: true
    action_ids: ["deliver_parcel"]
    action_effects:
      deliver_parcel:
        message: "You delivered the parcel and collected public-job payment."
        required_world_flags:
          delivery_job_active: true
        required_inventory:
          delivery_parcel: 1
        money_delta: 7
        inventory_delta:
          delivery_parcel: -1
        set_visible_state:
          last_dropoff: parcel_run_complete
        set_world_flags:
          delivery_job_open: true
          delivery_job_active: false

  - object_id: schedule_board
    name: Schedule Board
    object_type: board
    location_id: station
    summary: "A board listing shortcut routes and posted handling rules."
    readable: true
    resource_file: resources/schedule_board.txt

  - object_id: tool_rack
    name: Tool Rack
    object_type: rack
    location_id: supply_shop
    summary: "A rack carrying the small tools needed to unlock better jobs."
    visible_state:
      packaging_kit_price: 4
      repair_kit_price: 5
      packaging_kit_status: available
    actionable: true
    action_ids: ["buy_packaging_kit", "buy_repair_kit"]
    action_effects:
      buy_packaging_kit:
        message: "You bought the packaging kit."
        required_money: 4
        required_world_flags:
          packaging_kit_owned: false
        money_delta: -4
        inventory_delta:
          packaging_kit: 1
        set_world_flags:
          packaging_kit_owned: true
      buy_repair_kit:
        message: "You bought one repair kit."
        required_money: 5
        money_delta: -5
        inventory_delta:
          repair_kit: 1

skills:
  - skill_id: delivery_basics
    file: skills/delivery_basics.md
  - skill_id: tea_basics
    file: skills/tea_basics.md
  - skill_id: market_observation
    file: skills/market_observation.md
  - skill_id: town_history
    file: skills/town_history.md

action_costs:
  move_to:
    time_delta: 12
    energy_delta: -3
  open_resource:
    time_delta: 2
  load_skill:
    time_delta: 4
    energy_delta: -1
  call_action:
    time_delta: 8
    energy_delta: -4

event_rules:
  - event_id: delivery_open_notice
    required_world_flags:
      delivery_job_open: true
      delivery_job_active: false
    set_object_visible_state:
      job_board:
        latest_job: "Parcel run to the station pays 7 coins."
    trigger_once: false

  - event_id: delivery_active_notice
    required_world_flags:
      delivery_job_open: false
      delivery_job_active: true
    set_object_visible_state:
      job_board:
        latest_job: "Current parcel is already in transit."
    trigger_once: false

  - event_id: packaging_kit_notice
    required_world_flags:
      packaging_kit_owned: true
    set_object_visible_state:
      tool_rack:
        packaging_kit_status: sold_to_current_agent
    trigger_once: false

termination_config:
  max_steps: 20
  stop_on_zero_energy: true
